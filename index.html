<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 미로 - 자음 가족 찾기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0018;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  color: white;
  gap: 14px;
  padding: 16px;
}
#header {
  background: white;
  border: 4px solid #ffcc00;
  border-radius: 50px;
  padding: 10px 36px 12px;
  text-align: center;
  box-shadow: 0 0 20px #ffcc0055;
}
#family-label { font-size: 12px; color: #999; font-weight: bold; letter-spacing: 1px; margin-bottom: 6px; }
#targets-row { display: flex; gap: 10px; justify-content: center; }
.target-char {
  width: 50px; height: 50px;
  border-radius: 12px;
  background: #f5f0e0;
  border: 2px solid #ddd;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: bold; color: #222;
  transition: all 0.3s;
}
.target-char.collected {
  background: #22cc55; border-color: #11aa44; color: white;
  box-shadow: 0 0 10px #22cc5566; transform: scale(1.05);
}
#canvas-wrap {
  position: relative; border-radius: 14px; overflow: hidden;
  box-shadow: 0 0 40px #6600ff22, 0 8px 30px rgba(0,0,0,0.5);
}
canvas { display: block; }
#overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(5,0,20,0.88);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; text-align: center; padding: 24px;
}
#overlay.show { display: flex; }
#overlay-emoji { font-size: 52px; animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-8px)} }
#overlay-title { font-size: 26px; font-weight: bold; color: #ffcc00; text-shadow: 0 0 20px #ffcc00; }
#overlay-sub { font-size: 14px; color: #aaa; white-space: pre-line; line-height: 1.7; }
#overlay-btn {
  background: linear-gradient(135deg, #ffcc00, #ff9900);
  color: #222; border: none; border-radius: 30px;
  padding: 12px 36px; font-size: 18px; font-weight: bold;
  cursor: pointer; font-family: inherit; transition: transform 0.15s;
}
#overlay-btn:hover { transform: scale(1.06); }
#dpad {
  display: grid;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap: 5px;
}
.dpad-btn {
  width: 52px; height: 52px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 12px; color: white; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  user-select: none; -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background 0.1s, border-color 0.1s;
}
.dpad-btn.pressed { background: rgba(255,204,0,0.3); border-color: #ffcc00; }
.dpad-gap { pointer-events: none; }
#bottom { display: flex; flex-direction: column; align-items: center; gap: 8px; }
#level-dots { display: flex; gap: 8px; }
.dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); transition:all 0.3s; }
.dot.done { background:#22cc55; border-color:#11aa44; }
.dot.current { background:#ffcc00; border-color:#ff9900; }
#info { font-size: 12px; color: #666; }
#info span { color: #999; }
</style>
</head>
<body>

<div id="header">
  <div id="family-label">자음 가족 찾기</div>
  <div id="targets-row"></div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div id="overlay-emoji">🎉</div>
    <div id="overlay-title">자음 가족 완성!</div>
    <div id="overlay-sub"></div>
    <button id="overlay-btn" onclick="handleOverlay()">다음 단계 →</button>
  </div>
</div>

<div id="dpad">
  <div class="dpad-gap"></div>
  <div class="dpad-btn" id="btn-up"    onpointerdown="dpadPress('up')"    onpointerup="dpadRelease('up')"    onpointerleave="dpadRelease('up')">▲</div>
  <div class="dpad-gap"></div>
  <div class="dpad-btn" id="btn-left"  onpointerdown="dpadPress('left')"  onpointerup="dpadRelease('left')"  onpointerleave="dpadRelease('left')">◀</div>
  <div class="dpad-gap"></div>
  <div class="dpad-btn" id="btn-right" onpointerdown="dpadPress('right')" onpointerup="dpadRelease('right')" onpointerleave="dpadRelease('right')">▶</div>
  <div class="dpad-gap"></div>
  <div class="dpad-btn" id="btn-down"  onpointerdown="dpadPress('down')"  onpointerup="dpadRelease('down')"  onpointerleave="dpadRelease('down')">▼</div>
  <div class="dpad-gap"></div>
</div>

<div id="bottom">
  <div id="level-dots"></div>
  <div id="info">방향키 · WASD · 버튼으로 이동 &nbsp;|&nbsp; <span id="lv-info">레벨 1 / 4</span></div>
</div>

<script>
// ── Constants ──────────────────────────────────
const COLS=13, ROWS=11, CS=50;
const W=COLS*CS, H=ROWS*CS;

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=W; canvas.height=H;

// Offscreen canvas: maze pre-rendered here once per level
const off=document.createElement('canvas');
off.width=W; off.height=H;
const octx=off.getContext('2d');

const WALL_COLORS=['#ff3355','#33aaff','#33ffaa','#ffcc00','#ff55cc'];

const LEVELS=[
  {label:'ㅂ 가족 (입술소리)', targets:['ㅁ','ㅂ','ㅍ'], decoys:['ㄱ','ㄴ','ㄷ','ㄹ','ㅅ','ㅈ','ㅊ','ㅋ'], hint:'입술을 붙여서 내는 소리예요!'},
  {label:'ㄷ 가족 (잇몸소리)', targets:['ㄴ','ㄷ','ㅌ'], decoys:['ㄱ','ㄹ','ㅁ','ㅂ','ㅅ','ㅈ','ㅊ','ㅋ'], hint:'혀끝을 윗잇몸에 붙여서 내는 소리예요!'},
  {label:'ㄱ 가족 (여린입천장소리)', targets:['ㄱ','ㅋ','ㅇ'], decoys:['ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅈ','ㅌ'], hint:'혀 뒤쪽으로 내는 소리예요!'},
  {label:'ㅅ 가족 (잇소리)', targets:['ㅅ','ㅈ','ㅊ'], decoys:['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅋ','ㅌ'], hint:'이 사이로 바람을 내는 소리예요!'},
];

// ── State ──────────────────────────────────────
let lvIdx=0, level, maze, wallColors, items, player, collected;
let effects=[], particles=[], gameOver=false;
let lastMoveTime=0;
const heldKeys=new Set();
let dpadInterval=null;

// ── Utils ──────────────────────────────────────
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// ── Maze generation (iterative DFS) ────────────
// walls: [top=0, right=1, bottom=2, left=3]
const DIRS=[[-1,0,0,2],[0,1,1,3],[1,0,2,0],[0,-1,3,1]];
function makeMaze(){
  const m=Array.from({length:ROWS},()=>
    Array.from({length:COLS},()=>({visited:false,walls:[true,true,true,true]}))
  );
  const stack=[[0,0]]; m[0][0].visited=true;
  while(stack.length){
    const[r,c]=stack[stack.length-1];
    const nb=shuffle(DIRS).filter(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      return nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!m[nr][nc].visited;
    });
    if(!nb.length){stack.pop();continue;}
    const[dr,dc,w1,w2]=nb[0];
    m[r][c].walls[w1]=false; m[r+dr][c+dc].walls[w2]=false;
    m[r+dr][c+dc].visited=true; stack.push([r+dr,c+dc]);
  }
  return m;
}

// ── Pre-render maze to offscreen canvas ─────────
// shadowBlur runs only ONCE per level here — not every frame
function prerenderMaze(){
  octx.fillStyle='#0a0018';
  octx.fillRect(0,0,W,H);

  // Subtle grid
  octx.strokeStyle='rgba(50,25,90,0.28)';
  octx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){octx.beginPath();octx.moveTo(0,r*CS);octx.lineTo(W,r*CS);octx.stroke();}
  for(let c=0;c<=COLS;c++){octx.beginPath();octx.moveTo(c*CS,0);octx.lineTo(c*CS,H);octx.stroke();}

  // Group wall segments by color → one path per color (very fast)
  const byColor={};
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const{walls}=maze[r][c];
      const col=wallColors[r][c];
      if(!byColor[col]) byColor[col]=[];
      const x=c*CS,y=r*CS;
      if(walls[0]) byColor[col].push(x,y,x+CS,y);
      if(walls[1]) byColor[col].push(x+CS,y,x+CS,y+CS);
      if(walls[2]) byColor[col].push(x,y+CS,x+CS,y+CS);
      if(walls[3]) byColor[col].push(x,y,x,y+CS);
    }
  }

  // Glow pass (shadowBlur: only 5 draw calls total)
  for(const[col,pts] of Object.entries(byColor)){
    octx.save();
    octx.shadowBlur=18; octx.shadowColor=col;
    octx.strokeStyle=col; octx.lineWidth=5; octx.lineCap='square';
    octx.beginPath();
    for(let i=0;i<pts.length;i+=4){octx.moveTo(pts[i],pts[i+1]);octx.lineTo(pts[i+2],pts[i+3]);}
    octx.stroke();
    octx.restore();
  }

  // White core (single draw call for all walls)
  octx.strokeStyle='rgba(255,255,255,0.55)';
  octx.lineWidth=1.5; octx.lineCap='square';
  octx.beginPath();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const{walls}=maze[r][c];
      const x=c*CS,y=r*CS;
      if(walls[0]){octx.moveTo(x,y);octx.lineTo(x+CS,y);}
      if(walls[1]){octx.moveTo(x+CS,y);octx.lineTo(x+CS,y+CS);}
      if(walls[2]){octx.moveTo(x,y+CS);octx.lineTo(x+CS,y+CS);}
      if(walls[3]){octx.moveTo(x,y);octx.lineTo(x,y+CS);}
    }
  }
  octx.stroke();
}

// ── Level init ────────────────────────────────
function initLevel(idx){
  lvIdx=idx; level=LEVELS[idx];
  gameOver=false; effects=[]; particles=[];
  player={r:0,c:0}; collected=new Set(); items={};
  maze=makeMaze();
  wallColors=Array.from({length:ROWS},()=>
    Array.from({length:COLS},()=>WALL_COLORS[0|Math.random()*WALL_COLORS.length])
  );
  prerenderMaze();

  // Place items (excluding start cell)
  const pos=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(r||c) pos.push([r,c]);
  const sPos=shuffle(pos);
  shuffle([...level.targets,...level.decoys.slice(0,9)]).forEach((ch,i)=>{
    if(i>=sPos.length) return;
    const[r,c]=sPos[i];
    items[`${r},${c}`]={ch, isTarget:level.targets.includes(ch), shake:0, dead:false};
  });

  updateHeader();
  updateDots();
  document.getElementById('lv-info').textContent=`레벨 ${idx+1} / ${LEVELS.length}`;
  document.getElementById('overlay').classList.remove('show');
}

function updateHeader(){
  document.getElementById('family-label').textContent=level.label+' 찾기';
  const row=document.getElementById('targets-row');
  row.innerHTML='';
  level.targets.forEach(ch=>{
    const d=document.createElement('div');
    d.className='target-char'+(collected.has(ch)?' collected':'');
    d.id='tc-'+ch; d.textContent=ch;
    row.appendChild(d);
  });
}
function markCollected(ch){document.getElementById('tc-'+ch)?.classList.add('collected');}
function updateDots(){
  const wrap=document.getElementById('level-dots');
  wrap.innerHTML='';
  LEVELS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<lvIdx?' done':i===lvIdx?' current':'');
    wrap.appendChild(d);
  });
}

// ── Movement ──────────────────────────────────
function tryMove(dr,dc){
  if(gameOver) return;
  const{r,c}=player;
  const wi=dr===-1?0:dc===1?1:dr===1?2:3;
  if(maze[r][c].walls[wi]) return;
  player.r=r+dr; player.c=c+dc;
  const key=`${player.r},${player.c}`;
  const item=items[key];
  if(item&&!item.dead){
    if(item.isTarget){
      item.dead=true; collected.add(item.ch); markCollected(item.ch);
      spawnCollect(player.c*CS+CS/2, player.r*CS+CS/2);
      if(collected.size===level.targets.length){gameOver=true;setTimeout(showWin,400);}
    } else {
      item.shake=12;
      effects.push({x:player.c*CS+CS/2,y:player.r*CS+CS/2,life:16,maxLife:16,maxR:28,col:'#ff3333'});
    }
  }
}

function spawnCollect(x,y){
  effects.push({x,y,life:28,maxLife:28,maxR:46,col:'#ffcc00'});
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2, sp=2.5+Math.random()*2;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:28,maxLife:28,r:3+Math.random()*2,col:['#ffcc00','#fff','#ff9900'][i%3]});
  }
}

function showWin(){
  const last=lvIdx>=LEVELS.length-1;
  document.getElementById('overlay-emoji').textContent=last?'🏆':'🎉';
  document.getElementById('overlay-title').textContent=level.label+' 완성!';
  document.getElementById('overlay-sub').textContent=level.hint+(last?'\n\n모든 자음 가족 클리어! 대단해요!':'\n\n다음 자음 가족을 찾아보세요!');
  document.getElementById('overlay-btn').textContent=last?'🔄 처음부터':'다음 단계 →';
  document.getElementById('overlay').classList.add('show');
}
function handleOverlay(){initLevel(lvIdx>=LEVELS.length-1?0:lvIdx+1);}

// ── Input ─────────────────────────────────────
const KEY_MAP={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1],w:[-1,0],s:[1,0],a:[0,-1],d:[0,1]};

document.addEventListener('keydown',e=>{
  const m=KEY_MAP[e.key]; if(!m) return;
  e.preventDefault();
  if(!heldKeys.has(e.key)){tryMove(...m);lastMoveTime=performance.now();}
  heldKeys.add(e.key);
});
document.addEventListener('keyup',e=>{heldKeys.delete(e.key);});

const DPAD_MAP={up:[-1,0],down:[1,0],left:[0,-1],right:[0,1]};
function dpadPress(dir){
  const m=DPAD_MAP[dir];
  document.getElementById('btn-'+dir)?.classList.add('pressed');
  tryMove(...m); lastMoveTime=performance.now();
  clearInterval(dpadInterval);
  dpadInterval=setInterval(()=>tryMove(...m),130);
}
function dpadRelease(dir){
  clearInterval(dpadInterval);
  document.getElementById('btn-'+dir)?.classList.remove('pressed');
}

// Swipe on canvas
let tx0,ty0;
canvas.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.max(Math.abs(dx),Math.abs(dy))<12) return;
  Math.abs(dx)>Math.abs(dy)?tryMove(0,dx>0?1:-1):tryMove(dy>0?1:-1,0);
  e.preventDefault();
},{passive:false});

// ── Draw (no shadowBlur — fast every frame) ────
function draw(ts){
  const pulse=(Math.sin(ts*0.0025)+1)/2;

  // Blit pre-rendered maze (single drawImage call)
  ctx.drawImage(off,0,0);

  // Start cell glow
  ctx.save();
  ctx.globalAlpha=0.1+pulse*0.04;
  ctx.fillStyle='#44ffaa';
  ctx.fillRect(0,0,CS,CS);
  ctx.restore();

  // Ring effects
  effects=effects.filter(e=>e.life>0);
  for(const e of effects){
    const t=1-e.life/e.maxLife;
    ctx.save();
    ctx.globalAlpha=e.life/e.maxLife*0.85;
    ctx.strokeStyle=e.col; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(e.x,e.y,t*e.maxR,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    e.life--;
  }

  // Particles
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2); ctx.fill();
    ctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
  }

  // Items (layered circles instead of shadowBlur)
  for(const key in items){
    const item=items[key]; if(item.dead) continue;
    const[r,c]=key.split(',').map(Number);
    const cx=c*CS+CS/2, cy=r*CS+CS/2;
    let sx=0;
    if(item.shake>0){sx=Math.sin(item.shake*2)*5; item.shake--;}
    ctx.save();
    ctx.translate(cx+sx,cy);
    if(item.isTarget){
      const sc=1+pulse*0.08; ctx.scale(sc,sc);
      ctx.fillStyle='rgba(255,204,0,0.12)'; ctx.beginPath(); ctx.arc(0,0,26,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,204,0,0.28)'; ctx.beginPath(); ctx.arc(0,0,21,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffcc00';              ctx.beginPath(); ctx.arc(0,0,17,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.ellipse(-4,-5,6,3.5,-0.4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#222'; ctx.font='bold 20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(item.ch,0,1);
    } else {
      ctx.fillStyle='rgba(80,55,160,0.25)'; ctx.beginPath(); ctx.arc(0,0,21,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(65,48,148,0.88)'; ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(165,150,235,0.9)'; ctx.font='17px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(item.ch,0,1);
    }
    ctx.restore();
  }

  // Player (layered circles instead of shadowBlur)
  const px=player.c*CS+CS/2, py=player.r*CS+CS/2;
  const gr=18+pulse*5;
  ctx.fillStyle='rgba(140,200,255,0.06)'; ctx.beginPath(); ctx.arc(px,py,gr+7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(140,200,255,0.13)'; ctx.beginPath(); ctx.arc(px,py,gr,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(180,220,255,0.22)'; ctx.beginPath(); ctx.arc(px,py,17,0,Math.PI*2); ctx.fill();
  const g=ctx.createRadialGradient(px-4,py-5,1,px,py,15);
  g.addColorStop(0,'#fff'); g.addColorStop(0.45,'#d0eaff'); g.addColorStop(1,'rgba(80,140,255,0.15)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.beginPath(); ctx.ellipse(px-4,py-5,5,3,-0.4,0,Math.PI*2); ctx.fill();
}

// ── Game loop ──────────────────────────────────
function loop(ts=0){
  // Key-held auto-repeat (130ms)
  if(heldKeys.size>0 && ts-lastMoveTime>=130){
    for(const k of heldKeys){const m=KEY_MAP[k];if(m){tryMove(...m);break;}}
    lastMoveTime=ts;
  }
  draw(ts);
  requestAnimationFrame(loop);
}

initLevel(0);
loop();
</script>
</body>
</html>
